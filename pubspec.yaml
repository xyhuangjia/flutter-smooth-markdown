name: flutter_smooth_markdown
description: High-performance Flutter markdown renderer with syntax highlighting, LaTeX math, tables, footnotes, SVG images, and real-time streaming support.
version: 0.6.1
homepage: https://github.com/JackCaow/flutter-smooth-markdown
repository: https://github.com/JackCaow/flutter-smooth-markdown
issue_tracker: https://github.com/JackCaow/flutter-smooth-markdown/issues

topics:
  - markdown
  - renderer
  - syntax-highlighting
  - mermaid
  - charts

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Code syntax highlighting
  flutter_highlight: ^0.7.0

  # Image handling
  cached_network_image: ^3.3.0

  # URL handling
  url_launcher: ^6.2.0

  # Math formula rendering
  flutter_math_fork: ^0.7.2

  # SVG rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting and code quality
  flutter_lints: ^5.0.0

  # Mocking for tests
  mockito: ^5.4.0
  build_runner: ^2.4.0

  # Integration testing
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
